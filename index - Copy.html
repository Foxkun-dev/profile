<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolyFox | Interactive Profile</title>
    <link rel="icon" href="avt.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #121212;
            --card-color: rgba(30, 30, 30, 0.85); 
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #1db954; 
        }

        /* --- ẨN CHUỘT HỆ THỐNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        a, button, .start-btn, input { cursor: none !important; }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
        }

        /* --- BACKGROUND ĐỘNG --- */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background-image: url('background.gif'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.4) blur(5px);
            transform: scale(1.05); 
            transition: all 0.8s ease-out; 
        }

        body:hover #bg-layer {
            filter: brightness(0.9) blur(0px); 
            transform: scale(1);
        }

        /* --- HIỆU ỨNG HẠT --- */
        .particle {
            position: fixed;
            pointer-events: none; 
            border-radius: 50%;
            animation: pop 0.6s ease-out forwards;
            z-index: 99998; 
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* --- CUSTOM CURSOR --- */
        #custom-cursor {
            position: fixed; top: 0; left: 0;
            width: 50px; height: 50px;
            background-image: url('cursor.png'); 
            background-size: contain; background-repeat: no-repeat; background-position: center;
            background-color: transparent; border: none; border-radius: 0;
            mix-blend-mode: normal; box-shadow: none;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            pointer-events: none; z-index: 99999;
            transform: translate3d(0, 0, 0); 
            transition: transform 0.05s linear; 
            will-change: transform; 
        }

        #custom-cursor.hovered {
            width: 70px; height: 70px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        /* --- MÀN HÌNH CHỜ --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s;
        }

        .start-btn {
            font-size: 1.2rem; color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 30px; border-radius: 50px;
            transition: 0.3s; letter-spacing: 2px; text-transform: uppercase;
            background: rgba(0,0,0,0.5);
        }
        .start-btn:hover {
            color: white; border-color: white;
            background: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- PROFILE CARD --- */
        #profile-card {
            display: none;
            width: 360px;
            background: var(--card-color);
            padding: 40px 30px; border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            animation: fadeUp 0.8s ease forwards;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            margin-bottom: 20px; border: 3px solid rgba(255,255,255,0.2); transition: transform 0.3s;
        }
        .avatar:hover { transform: scale(1.05); border-color: white; }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .job-title { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 25px; }

        .socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .social-link { color: var(--text-secondary); font-size: 1.3rem; transition: 0.2s; }
        .social-link:hover { color: white; transform: translateY(-3px); text-shadow: 0 0 10px white; }

        /* --- MUSIC PLAYER --- */
        .player-area {
            background: rgba(0,0,0,0.4);
            border-radius: 12px; padding: 15px;
            display: flex; align-items: center; gap: 15px; text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .disk-mini {
            width: 45px; height: 45px;
            border-radius: 50%; 
            object-fit: cover;
            border: 2px solid #333;
            animation: spin 5s linear infinite;
            animation-play-state: paused; 
            flex-shrink: 0; /* Không bị bóp méo khi chữ dài */
        }
        
        .disk-mini.playing {
            animation-play-state: running;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- XỬ LÝ CHỮ CHẠY (LED SCROLL) --- */
        .song-info { 
            flex-grow: 1; 
            overflow: hidden; /* Ẩn phần chữ thừa */
            white-space: nowrap;
            margin-left: 10px; /* Cách đĩa nhạc ra chút */
        }
        
        /* Class này bọc tên bài hát */
        .song-title-wrapper {
            display: block;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        .song-title { 
            font-size: 0.9rem; 
            font-weight: 600; 
            color: var(--primary);
            display: inline-block;
        }

        /* Khi thêm class này vào, chữ sẽ chạy */
        .scrolling-text {
            display: inline-block;
            padding-left: 100%; /* Bắt đầu chạy từ bên phải khung */
            animation: marquee 12s linear infinite; /* Chạy đều trong 12s */
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .artist-name { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

        .controls { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        .btn-ctl { background: none; border: none; color: white; font-size: 1rem; opacity: 0.7; transition: 0.2s; }
        .btn-ctl:hover { opacity: 1; transform: scale(1.1); text-shadow: 0 0 8px white; }
        
        .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: white; transition: width 0.1s linear; }
        .active-loop { color: var(--accent) !important; opacity: 1; text-shadow: 0 0 10px var(--accent); }

    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div id="custom-cursor"></div>

    <div id="overlay">
        <div class="start-btn hover-target">Click Me...</div>
    </div>

    <div id="profile-card">
        <img src="avt.png" class="avatar" alt="Avatar">
        <h1>Duy Lâm - Dylm29_</h1>
        <p class="job-title">Developer & Gamer</p>

        <div class="socials">
            <a href="https://discord.gg/8XZ9zpR3V7" target="_blank" class="social-link hover-target"><i class="fab fa-discord"></i></a>
            <a href="https://www.facebook.com/F.Duylam" target="_blank" class="social-link hover-target"><i class="fab fa-facebook"></i></a>
            <a href="https://www.tiktok.com/@ldlam_" target="_blank" class="social-link hover-target"><i class="fab fa-tiktok"></i></a>
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=luuduylam29@gmail.com" target="_blank" class="social-link hover-target"><i class="fa-solid fa-envelope"></i></a>
            <a href="https://github.com/Foxkun-dev" target="_blank" class="social-link hover-target"><i class="fab fa-github"></i></a>
        </div>

        <div class="player-area">
            <img src="musicpt.png" id="disk-img" class="disk-mini">
            <div class="song-info">
                <div class="song-title-wrapper" id="song-name-container">
                    <span class="song-title" id="song-name">Track 01</span>
                </div>
                <div class="artist-name">Dev by me</div>
            </div>
            <div class="controls">
                <button class="btn-ctl hover-target" id="prev"><i class="fa-solid fa-backward-step"></i></button>
                <button class="btn-ctl hover-target" id="play"><i class="fa-solid fa-play"></i></button>
                <button class="btn-ctl hover-target" id="next"><i class="fa-solid fa-forward-step"></i></button>
                <button class="btn-ctl hover-target" id="loop"><i class="fa-solid fa-repeat"></i></button>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="prog-fill"></div>
        </div>

        <audio id="audio"></audio>
    </div>

    <script>
        // --- 1. CON TRỎ CHUỘT ---
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate3d(${e.clientX - 25}px, ${e.clientY - 25}px, 0)`;
        });
        const hoverTargets = document.querySelectorAll('.hover-target');
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
            target.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
        });

        // --- 2. HIỆU ỨNG HẠT ---
        document.addEventListener('click', (e) => createParticles(e.clientX, e.clientY));
        function createParticles(x, y) {
            const particleCount = 12; 
            const colors = ['#ffffff', '#C0C0C0', '#00f3ff'];
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                document.body.appendChild(particle);
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.random() * 4 + 4;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50; 
                const tx = Math.cos(angle) * velocity + 'px';
                const ty = Math.sin(angle) * velocity + 'px';
                particle.style.width = `${size}px`; particle.style.height = `${size}px`;
                particle.style.backgroundColor = color; particle.style.left = `${x}px`; particle.style.top = `${y}px`;
                particle.style.boxShadow = `0 0 10px ${color}`;
                particle.style.setProperty('--tx', tx); particle.style.setProperty('--ty', ty);
                setTimeout(() => { particle.remove(); }, 600);
            }
        }

        // --- 3. XỬ LÝ NHẠC VÀ CHỮ CHẠY ---
        const songs = [
            { name: "Đường tôi chở em về - Bùi Trường Linh", src: "music.mp3", img: "musicpt.png" },
            { name: "Tiny love - Thịnh Suy", src: "music2.mp3", img: "musicpt2.png" },
            { name: "3107 - W/n ft. Nâu, Duongg", src: "music3.mp3", img: "musicpt3.png" }
        ];

        let index = 0;
        let isLooping = false;
        
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const nextBtn = document.getElementById('next');
        const prevBtn = document.getElementById('prev');
        const loopBtn = document.getElementById('loop');
        const overlay = document.getElementById('overlay');
        const card = document.getElementById('profile-card');
        const diskImg = document.getElementById('disk-img');
        const progFill = document.getElementById('prog-fill');
        
        // Element tên bài hát
        const songNameContainer = document.getElementById('song-name-container');

        function load(i) {
            audio.src = songs[i].src;
            diskImg.src = songs[i].img;

            const name = songs[i].name;
            
            // XỬ LÝ CHỮ CHẠY TẠI ĐÂY
            // Nếu tên dài hơn 15 ký tự -> Bọc vào span có class scrolling-text
            if (name.length > 15) {
                songNameContainer.innerHTML = `<span class="song-title scrolling-text">${name}</span>`;
            } else {
                // Nếu ngắn -> Hiển thị bình thường (không chạy)
                songNameContainer.innerHTML = `<span class="song-title">${name}</span>`;
            }
        }

        overlay.addEventListener('click', () => {
            overlay.style.opacity = 0;
            setTimeout(() => {
                overlay.style.display = 'none';
                card.style.display = 'block';
                load(index);
                audio.play();
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                diskImg.classList.add('playing');
            }, 800);
        });

        playBtn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            if (audio.paused) { 
                audio.play(); 
                playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                diskImg.classList.add('playing');
            } else { 
                audio.pause(); 
                playBtn.innerHTML = '<i class="fa-solid fa-play"></i>'; 
                diskImg.classList.remove('playing');
            } 
        });

        nextBtn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            index = (index + 1) % songs.length; 
            load(index); 
            audio.play(); 
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
            diskImg.classList.add('playing');
        });

        prevBtn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            index = (index - 1 + songs.length) % songs.length; 
            load(index); 
            audio.play(); 
            playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
            diskImg.classList.add('playing');
        });

        loopBtn.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            isLooping = !isLooping; 
            audio.loop = isLooping; 
            loopBtn.classList.toggle('active-loop'); 
        });

        audio.addEventListener('ended', () => { if(!isLooping) nextBtn.click(); });
        audio.addEventListener('timeupdate', () => { if(audio.duration) { const percent = (audio.currentTime / audio.duration) * 100; progFill.style.width = percent + '%'; } });
    </script>
</body>
</html>
